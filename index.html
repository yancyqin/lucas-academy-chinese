<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>中文阅读 · Lucas Academy</title>
<link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>

<header class="top">
  <div class="brand">📖 中文阅读<span class="brand-sub">Lucas Academy Chinese</span></div>
  <label class="pinyin-toggle" for="pinyin-toggle">
    <input id="pinyin-toggle" type="checkbox">
    <span>拼音</span>
  </label>
  <nav id="tabs" class="tabs"></nav>
</header>

<main id="content" class="content"></main>

<aside id="panel" class="panel" aria-live="polite">
  <button id="panel-close" class="panel-close" title="Close">✕</button>
  <div class="panel-top">
    <span id="panel-word" class="panel-word"></span>
    <span id="panel-pinyin" class="panel-pinyin"></span>
    <span class="panel-buttons">
      <button id="btn-say" class="say">🔊 Play</button>
      <button id="btn-slow" class="say">🐢 Slower</button>
    </span>
    <span class="panel-buttons panel-mark-buttons">
      <button id="btn-highlight" class="mark-action">⭐ Mark</button>
      <button id="btn-unhighlight" class="mark-action" hidden>✕ Unmark</button>
    </span>
  </div>
  <p id="panel-meaning" class="panel-meaning"></p>
  <p id="panel-usage" class="panel-usage"></p>
  <div class="panel-sentence-row">
    <button id="btn-sentence" class="say">🔊 Sentence</button>
    <span id="panel-sentence" class="panel-sentence"></span>
  </div>
</aside>

<script type="module" src="js/app.js?v=3"></script>
</body>
</html>
